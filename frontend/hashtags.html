<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hashtag Toolkit — Sirius Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { background: #0A0A0A; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
    .logo-link { text-decoration: none; color: inherit; display: inline-block; margin-bottom: 36px; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 24px; color: #4F8EFF; }
    .logo-name { font-size: 16px; font-weight: 700; letter-spacing: 3px; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .subtitle { color: #6B7280; font-size: 15px; margin-bottom: 36px; }
    .card { background: #111827; border: 1px solid #1F2937; border-radius: 16px; padding: 28px; margin-bottom: 24px; }
    .field { margin-bottom: 20px; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; font-size: 13px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    input, select, textarea { width: 100%; background: #0A0A0A; border: 1px solid #374151; border-radius: 10px; color: #fff; font-size: 15px; font-family: 'Inter', sans-serif; padding: 12px 14px; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: #4F8EFF; }
    .platform-checkboxes { display: flex; flex-wrap: wrap; gap: 10px; }
    .platform-checkboxes label { display: flex; align-items: center; gap: 6px; cursor: pointer; background: #0A0A0A; border: 1px solid #374151; border-radius: 8px; padding: 8px 14px; font-size: 13px; text-transform: none; letter-spacing: 0; color: #9CA3AF; transition: all 0.2s; }
    .platform-checkboxes input[type="checkbox"] { width: auto; }
    .platform-checkboxes label:has(input:checked) { border-color: #4F8EFF; background: #4F8EFF20; color: #4F8EFF; }
    .btn-primary { background: #4F8EFF; color: #fff; border: none; border-radius: 12px; padding: 16px 32px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; transition: background 0.2s; margin-top: 8px; }
    .btn-primary:hover { background: #3B7BF5; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .loader-wrap { text-align: center; padding: 60px 20px; }
    .loader { width: 48px; height: 48px; border: 4px solid #1F2937; border-top-color: #4F8EFF; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { color: #9CA3AF; font-size: 15px; }
    .results-section { display: none; }
    .results-section.show { display: block; }
    .results-header { text-align: center; margin-bottom: 32px; }
    .results-header h1 { font-size: 26px; }
    .results-header .subtitle { margin-bottom: 0; }
    .platform-block { background: #111827; border: 1px solid #1F2937; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .platform-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .platform-header .icon { font-size: 22px; }
    .platform-header h2 { font-size: 18px; font-weight: 700; margin: 0; }
    .platform-header .badge { margin-left: auto; background: #4F8EFF20; color: #4F8EFF; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .hashtag { background: #1F2937; color: #D1D5DB; font-size: 13px; padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: all 0.15s; user-select: none; }
    .hashtag:hover { background: #374151; color: #fff; }
    .hashtag.copied { background: #22C55E40; color: #22C55E; }
    .copy-all-btn { background: none; border: 1px solid #374151; color: #6B7280; font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; margin-bottom: 16px; transition: all 0.2s; }
    .copy-all-btn:hover { border-color: #4F8EFF; color: #4F8EFF; }
    .copy-feedback { font-size: 12px; color: #22C55E; margin-left: 8px; display: none; }
    .error-msg { background: #EF444420; border: 1px solid #EF444440; border-radius: 10px; padding: 16px; color: #FCA5A5; font-size: 14px; margin-top: 16px; display: none; }
    .error-msg.show { display: block; }
    .back-link { display: inline-block; margin-bottom: 24px; color: #6B7280; font-size: 14px; text-decoration: none; }
    .back-link:hover { color: #9CA3AF; }
    .cta-footer { text-align: center; margin-top: 32px; padding-top: 24px; border-top: 1px solid #1F2937; }
    .cta-footer p { color: #6B7280; font-size: 14px; margin-bottom: 16px; }
    .btn-secondary { display: inline-block; background: #111827; border: 1px solid #4F8EFF; color: #4F8EFF; border-radius: 12px; padding: 14px 28px; font-size: 15px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
    .btn-secondary:hover { background: #4F8EFF10; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo-link">
      <div class="logo">
        <span class="logo-icon">◎</span>
        <span class="logo-name">SIRIUS PULSE</span>
      </div>
    </a>

    <div id="input-form">
      <h1>Hashtag Toolkit</h1>
      <p class="subtitle">Get optimized hashtags for your next post, single, or album launch.</p>

      <div class="card">
        <div class="field">
          <label>Artist / Stage Name</label>
          <input type="text" id="stage_name" placeholder="e.g. Calvin Ross">
        </div>
        <div class="field">
          <label>Genre</label>
          <select id="genre">
            <option value="" disabled selected>Select genre</option>
            <option>R&B</option>
            <option>Hip-Hop</option>
            <option>Pop</option>
            <option>Afrobeats</option>
            <option>Neo-Soul</option>
            <option>Alt R&B</option>
            <option>Trap</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>Sub-genre / Style</label>
          <input type="text" id="subgenre" placeholder="e.g. dark R&B, moody vibes">
        </div>
        <div class="field">
          <label>What are you promoting?</label>
          <input type="text" id="promoting" placeholder="e.g. New single 'Night Drive', album drop">
        </div>
        <div class="field">
          <label>Platforms</label>
          <div class="platform-checkboxes">
            <label><input type="checkbox" value="instagram" checked> 📸 Instagram</label>
            <label><input type="checkbox" value="tiktok"> 🎵 TikTok</label>
            <label><input type="checkbox" value="youtube"> ▶️ YouTube</label>
            <label><input type="checkbox" value="twitter"> 🐦 Twitter/X</label>
          </div>
        </div>
      </div>

      <button class="btn-primary" id="generate-btn" onclick="generateHashtags()">
        Generate Hashtags
      </button>
      <div class="error-msg" id="error-msg"></div>
    </div>

    <div class="loader-wrap" id="loading-section" style="display:none">
      <div class="loader"></div>
      <div class="loader-text">Building your hashtag strategy…</div>
    </div>

    <div class="results-section" id="results-section">
      <a href="/hashtags" class="back-link" onclick="resetForm(); return false">← Generate another</a>
      <div class="results-header">
        <h1>Your Hashtags</h1>
        <p class="subtitle">Tap any hashtag to copy · Tap "Copy all" to grab them all at once</p>
      </div>
      <div id="platform-results"></div>
      <div class="cta-footer">
        <p>Ready to build a full content strategy?</p>
        <a href="/" class="btn-secondary">Build My Strategy →</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';

    async function generateHashtags() {
      const genre = document.getElementById('genre').value;
      const subgenre = document.getElementById('subgenre').value.trim();
      const promoting = document.getElementById('promoting').value.trim();
      const stageName = document.getElementById('stage_name').value.trim();
      const platforms = Array.from(document.querySelectorAll('.platform-checkboxes input:checked')).map(c => c.value);

      if (!genre) { showError('Please select a genre.'); return; }
      if (!promoting) { showError('Please describe what you\'re promoting.'); return; }
      if (platforms.length === 0) { showError('Please select at least one platform.'); return; }

      document.getElementById('input-form').style.display = 'none';
      document.getElementById('loading-section').style.display = 'block';
      document.getElementById('error-msg').classList.remove('show');

      try {
        const res = await fetch(API_BASE + '/hashtags', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ genre, subgenre, promoting, stage_name: stageName, platforms }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || 'Generation failed');
        }
        const data = await res.json();
        showResults(data);
      } catch (err) {
        document.getElementById('input-form').style.display = 'block';
        document.getElementById('loading-section').style.display = 'none';
        showError(err.message);
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
    }

    async function copyHashtag(el, tag) {
      try {
        await navigator.clipboard.writeText(tag);
        el.classList.add('copied');
        const orig = el.textContent;
        el.textContent = '✓';
        setTimeout(() => {
          el.classList.remove('copied');
          el.textContent = orig;
        }, 1200);
      } catch (e) {}
    }

    async function copyAll(platform, tags, el) {
      try {
        await navigator.clipboard.writeText(tags.join(' '));
        const feedback = el.querySelector('.copy-feedback');
        feedback.style.display = 'inline';
        setTimeout(() => { feedback.style.display = 'none'; }, 2000);
      } catch (e) {}
    }

    function showResults(data) {
      document.getElementById('loading-section').style.display = 'none';
      document.getElementById('results-section').classList.add('show');

      const icons = { instagram: '📸', tiktok: '🎵', youtube: '▶️', twitter: '🐦' };
      const container = document.getElementById('platform-results');
      container.innerHTML = '';

      const hashtags = data.hashtags || {};
      for (const [platform, tagList] of Object.entries(hashtags)) {
        if (!tagList || !tagList.length) continue;
        const icon = icons[platform] || '◎';
        const safeTags = Array.isArray(tagList) ? tagList : [];
        container.innerHTML += `
          <div class="platform-block">
            <div class="platform-header">
              <span class="icon">${icon}</span>
              <h2>${platform.charAt(0).toUpperCase() + platform.slice(1)}</h2>
              <span class="badge">${safeTags.length} hashtags</span>
            </div>
            <button class="copy-all-btn" onclick="copyAll('${platform}', ${JSON.stringify(safeTags)}, this)">
              Copy all ${platform} hashtags <span class="copy-feedback">✓ Copied!</span>
            </button>
            <div class="tag-grid">
              ${safeTags.map(t => {
                const safe = String(t).replace(/'/g, "\\'");
                return `<span class="hashtag" onclick="copyHashtag(this, '${safe}')">${t}</span>`;
              }).join('')}
            </div>
          </div>
        `;
      }
    }

    function resetForm() {
      document.getElementById('results-section').classList.remove('show');
      document.getElementById('input-form').style.display = 'block';
      document.getElementById('error-msg').classList.remove('show');
    }
  </script>
</body>
</html>
